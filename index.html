<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The Living Vinyl</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="js/lyrics-data.js"></script>
  <script src="js/main.js"></script>
</head>

<body>

  <!-- Loading screen -->
  <div class="arjs-loader">
    <div class="arjs-loader__title">The Living Vinyl</div>
    <div class="arjs-loader__spinner"></div>
    <div class="arjs-loader__text">Loading…<br>Point your camera at the album cover when ready.</div>
  </div>

  <!-- YouTube background video -->
  <div id="yt-bg">
    <iframe
      src="https://www.youtube.com/embed/S1stZOAIcW4?autoplay=1&mute=1&loop=1&playlist=S1stZOAIcW4&controls=0&showinfo=0&rel=0&modestbranding=1&playsinline=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Particle canvas: snowflakes (always) + lyric particles (while playing) -->
  <canvas id="particle-canvas"></canvas>

  <!-- Waveform visualizer -->
  <canvas id="visualizer" class="visualizer hidden"></canvas>

  <p id="scan-prompt" class="scan-prompt hidden">Point camera at album cover</p>

  <button id="start-btn" class="start-btn">Tap to Begin</button>

  <a-scene
    id="main-scene"
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true; alpha: true;"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; detectionMode: mono;">

    <a-assets timeout="10000">
      <audio id="album-audio" src="assets/music.mp3" preload="none" crossorigin="anonymous"></audio>
    </a-assets>

    <a-marker
      id="cover-marker"
      type="pattern"
      url="assets/markers/cover.patt"
      smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5"
      emitevents="true">
    </a-marker>

    <a-entity camera>
      <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="far: 20; interval: 100;"></a-entity>
    </a-entity>

  </a-scene>

</body>
</html>
